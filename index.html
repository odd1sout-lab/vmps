<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music App</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">

</head>
<body>

<div class="container-fluid">
  <div class="row">

    <div class="col-md-2 sidebar">
      <h4>VMP</h4>
    </div>

    <div class="col-md-10 p-4">
      <h3>Альбомы</h3>

      <div class="row g-3">
        <div class="col-6 col-md-3">
          <div class="music-card" onclick="openAlbum('album1')">
            <img src="img/Sailing the Seas of Cheese.jpg" class="img-fluid rounded">
            <p style="text-align: center;">Sailing the Seas of Cheese</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="player d-flex align-items-center justify-content-between">
  <div>
    <strong id="songTitle">Не выбрано</strong>
  </div>

  <div>
    <button class="btn btn-light btn-sm" onclick="togglePlay()">▶</button>
  </div>

  <div class="w-50">
    <div class="progress" onclick="seek(event)">
      <div id="progressBar" class="progress-bar"></div>
    </div>
  </div>
</div>

<audio id="audio"></audio>


<script src="script.js"></script>

</body>
</html>
